services:
  idx-web:
    stop_grace_period: 30s
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import sys, urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/api/health', timeout=5); sys.exit(0)
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    stop_grace_period: 15s
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1 || exit 1
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
