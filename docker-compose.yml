services:
  idx-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idx-trading-lab-web
    env_file:
      - .env
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./config:/app/config
      - ./data:/app/data
      - ./reports:/app/reports
      - ./models:/app/models
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: idx-trading-lab-nginx
    profiles: ["proxy"]
    depends_on:
      - idx-web
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.compose.conf.example:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
