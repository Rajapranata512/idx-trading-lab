name: IDX Trading Lab - Daily Pipeline

on:
  schedule:
    # Run after IDX market close, with retries for delayed EOD provider updates.
    # Avoid minute 00 because GitHub Actions schedules can be delayed or dropped
    # during high-load periods at the start of each hour.
    - cron: '15 10 * * 1-5' # 17:15 WIB
    - cron: '15 11 * * 1-5' # 18:15 WIB retry
    - cron: '30 12 * * 1-5' # 19:30 WIB fallback
  push:
    branches: [main]
    paths:
      - '.github/workflows/daily-run.yml'
      - 'src/**'
      - 'scripts/**'
      - 'config/**'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: idx-trading-lab-daily-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Daily Pipeline
      env:
        EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # Ingestion, Feature Computation, Scoring, and Report Generation
        python -m src.cli run-daily


    - name: Export Static UI Data
      env:
        PYTHONPATH: .
      run: |
        python scripts/export_static_web.py

    - name: Commit and Push Results
      run: |
        # Use a custom email to prevent Vercel from ignoring github-actions[bot] commits by default
        git config --local user.email "pipeline@idxtradinglab.local"
        git config --local user.name "IDX Lab Pipeline"
        
        # Add generated reports, web static data, AND web/reports/ for Vercel
        # Use --force to override .gitignore rules for report files
        git add --force data/ reports/ web/public_*.json web/reports/
        
        # Only commit if there are changes
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated Daily Run: $(date -u +'%Y-%m-%d')"
          git push
        else
          echo "No changes to commit"
        fi

    - name: Notify on Failure
      if: failure()
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        if [ -n "$TELEGRAM_BOT_TOKEN" ] && [ -n "$TELEGRAM_CHAT_ID" ]; then
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="⚠️ IDX Trading Lab Daily Pipeline FAILED on $(date -u +'%Y-%m-%d %H:%M UTC'). Check GitHub Actions for details." \
            -d parse_mode="HTML" || true
        fi
