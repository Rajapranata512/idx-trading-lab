name: IDX Trading Lab - Daily Pipeline

on:
  schedule:
    # Run everyday at 10:00 UTC (17:00 WIB - After IDX market close)
    - cron: '0 10 * * 1-5'
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Daily Pipeline
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        # Ingestion, Feature Computation, Scoring, and Report Generation
        python -m src.cli run-daily

    - name: Generate Paper Fills
      run: |
        python -m src.cli paper-fills

    - name: Export Static UI Data
      env:
        PYTHONPATH: .
      run: |
        python scripts/export_static_web.py

    - name: Commit and Push Results
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        # Add generated reports and web public JSONs
        git add data/ reports/ web/public_*.json
        
        # Only commit if there are changes
        if ! git diff-index --quiet HEAD; then
          git commit -m "Automated Daily Run: $(date -u +'%Y-%m-%d')"
          git push
        else
          echo "No changes to commit"
        fi
