name: IDX Trading Lab - Model V2 Pre-Open Telegram

on:
  schedule:
    # Around one hour before regular IDX market open, avoiding minute 00
    # because GitHub Actions schedules can be delayed or dropped then.
    - cron: '5 1 * * 1-5' # 08:05 WIB
  workflow_dispatch:

jobs:
  send-model-v2-shadow:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Send Model V2 shadow pre-open Telegram
      env:
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: |
        python -m src.cli send-model-v2-shadow-telegram
